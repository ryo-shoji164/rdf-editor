# SonarCloud Configuration for RDF Editor

# Project key and name (must match SonarCloud project)
sonar.projectKey=ryo-shoji164_rdf-editor
sonar.projectName=RDF Editor
sonar.projectVersion=0.2.1

# Source directories
sonar.sources=src

# Test directories
sonar.tests=tests

# Language
sonar.language=ts

# Code coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=node_modules/**,dist/**,coverage/**,**/*.test.ts,**/*.test.tsx

# Copyright and License Detection
# Detects license headers in source files
sonar.copyrightNotice=Copyright (c) 2024-present ryo-shoji164
sonar.license=MIT

# Web UI
sonar.links.scm=https://github.com/ryo-shoji164/rdf-editor
sonar.links.issue=https://github.com/ryo-shoji164/rdf-editor/issues
